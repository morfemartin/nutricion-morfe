<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#bef264" />
  <title>Nutrición Morfe</title>
  <link rel="manifest" href="./manifest.json" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .hide-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-neutral-50">
  <div id="root"></div>
  <script type="text/babel">
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycby9jIu1KAEwT2CdNI8zvU5afuazzQ38RenIZRMdAoXDT7uJLW-e3OhO_YYRmMs-by6W/exec";
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const days = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
    const currentDay = () => days[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];

    const people = {
      martin: {
        label: "Martín",
        icon: "♂",
        goal: "84 kg → 80 kg → 77–78 kg",
        calories: "2250–2350 kcal",
        protein: "160–175 g proteína",
        card: "from-lime-200 to-emerald-100",
        chip: "bg-lime-400",
      },
      mama: {
        label: "Mamá",
        icon: "♀",
        goal: "79 kg → 76–77 kg → 74–75 kg",
        calories: "1550–1750 kcal",
        protein: "100–120 g proteína",
        card: "from-pink-100 to-rose-50",
        chip: "bg-rose-300",
      },
    };

    const mealPlans = {
      martin: {
        Lunes: { tag: "Gym", meals: { Desayuno: "Arepa/pan + perico: 70 g harina o 100 g pan + 3 huevos + tomate", Almuerzo: "Pollo + arroz + lentejas: 200 g pollo + 180 g arroz + 150 g lentejas", Merienda: "Pan + pasta de hígado + mayonesa: 70–80 g pan + 30 g pasta + 10 g mayonesa", Cena: "Sopa abundante + 180–200 g pollo" } },
        Martes: { tag: "Gym", meals: { Desayuno: "Arepa/pan + huevos fritos: 70 g harina o 100 g pan + 3 huevos", Almuerzo: "Carne molida + arroz + lentejas: 170 g carne + 180 g arroz + 150 g lentejas", Merienda: "3 huevos cocidos", Cena: "Pollo + aguacate + sopa: 200 g pollo + 50 g aguacate + sopa" } },
        Miércoles: { tag: "Cardio suave / pasos", meals: { Desayuno: "4 huevos cocidos o 3 huevos con tomate", Almuerzo: "Pollo + lentejas + arroz: 200 g pollo + 200 g lentejas + 120–150 g arroz", Merienda: "70 g pan + 30 g queso o 2 huevos", Cena: "Sopa + 150 g carne molida" } },
        Jueves: { tag: "Gym", meals: { Desayuno: "Arepa/pan + perico: 70 g harina o 100 g pan + 3 huevos + tomate", Almuerzo: "Pollo + arroz + aguacate: 220 g pollo + 180 g arroz + 50 g aguacate", Merienda: "Pan + pasta de hígado + mayonesa: 70 g pan + 30 g pasta + 10 g mayonesa", Cena: "Carne molida + lentejas + arepa/pan: 160 g carne + 180 g lentejas + 50 g harina o 75 g pan" } },
        Viernes: { tag: "Gym", meals: { Desayuno: "Arepa/pan + huevos fritos: 70 g harina o 100 g pan + 3 huevos", Almuerzo: "Carne molida + arroz + queso: 170 g carne + 200 g arroz + 30 g queso", Merienda: "3 huevos cocidos", Cena: "Pollo + sopa + plátano: 180–200 g pollo + sopa + 150 g plátano" } },
        Sábado: { tag: "Descanso activo", meals: { Desayuno: "Arepa/pan + perico: 70 g harina o 100 g pan + 3 huevos", Almuerzo: "Hígado + arroz + lentejas: 180–200 g hígado + 180 g arroz + 150 g lentejas", Merienda: "Pan + queso: 70–80 g pan + 30 g queso", Cena: "Pollo + sopa/aguacate: 200 g pollo + sopa + 40–50 g aguacate" } },
        Domingo: { tag: "Carrera 10 km+", meals: { "Pre-carrera": "80–100 g pan o 50–60 g harina de arepa", "Post-carrera": "Pollo + arroz + lentejas: 220 g pollo + 250–300 g arroz + 120–150 g lentejas", Merienda: "Arepa/pan + huevos: 60 g harina o 90 g pan + 2–3 huevos", Cena: "Sopa + pollo + plátano: sopa + 180 g pollo + 150 g plátano" } },
      },
      mama: {
        Lunes: { tag: "Gym", meals: { Desayuno: "Arepa + perico: 45–50 g harina + 2 huevos + tomate", Almuerzo: "Pollo + arroz + lentejas: 140 g pollo + 110 g arroz + 130 g lentejas", Merienda: "Pan + pasta de hígado + mayonesa: 50–60 g pan + 20–25 g pasta + 5–8 g mayonesa", Cena: "Sopa abundante + 120–140 g pollo" } },
        Martes: { tag: "Gym", meals: { Desayuno: "2 huevos cocidos + tomate + 30 g queso opcional", Almuerzo: "Carne molida + arroz + lentejas: 120 g carne + 100–120 g arroz + 130 g lentejas", Merienda: "Arepa pequeña con queso: 40 g harina + 25 g queso", Cena: "Pollo + aguacate + sopa: 130 g pollo + 40 g aguacate + sopa" } },
        Miércoles: { tag: "Cardio suave / caminata", meals: { Desayuno: "Arepa + huevos/perico: 45 g harina + 2 huevos", Almuerzo: "Pollo + lentejas: 150 g pollo + 170 g lentejas + tomate/vegetales", Merienda: "1–2 huevos o 30 g queso", Cena: "Sopa abundante + 100–120 g carne molida" } },
        Jueves: { tag: "Gym", meals: { Desayuno: "Arepa + perico: 50 g harina + 2 huevos + tomate", Almuerzo: "Pollo + arroz + aguacate: 150 g pollo + 120 g arroz + 35–40 g aguacate", Merienda: "Pan + pasta de hígado + mayonesa: 50 g pan + 20 g pasta + 5–8 g mayonesa", Cena: "Lentejas + huevo/pollo: 170 g lentejas + 1 huevo o 100 g pollo" } },
        Viernes: { tag: "Gym", meals: { Desayuno: "2 huevos + arepa pequeña: 40 g harina", Almuerzo: "Carne molida + arroz + tomate: 130 g carne + 120 g arroz + tomate", Merienda: "30 g queso o 2 huevos", Cena: "Sopa + pollo + plátano: 120 g pollo + sopa + 80–100 g plátano" } },
        Sábado: { tag: "Descanso activo", meals: { Desayuno: "Arepa + perico: 45–50 g harina + 2 huevos", Almuerzo: "Hígado + arroz + lentejas: 120–150 g hígado + 100 g arroz + 120 g lentejas", Merienda: "Pan pequeño con queso: 50 g pan + 20–25 g queso", Cena: "Pollo + sopa/vegetales: 130–150 g pollo + sopa" } },
        Domingo: { tag: "Cardio / caminata larga", meals: { Desayuno: "Arepa + huevos: 50–55 g harina + 2 huevos", Almuerzo: "Proteína + arroz + lentejas: 140 g pollo/carne + 130 g arroz + 130 g lentejas", Merienda: "Opción ligera: fruta si hay, huevo o queso", Cena: "Sopa + pollo: sopa + 120–140 g pollo" } },
      }
    };

    function App() {
      const [activePerson, setActivePerson] = React.useState("martin");
      const [activeDay, setActiveDay] = React.useState(currentDay());
      const [logs, setLogs] = React.useState({ martin: [], mama: [] });
      const [form, setForm] = React.useState({ date: todayISO(), weight: "", waist: "", steps: "", notes: "" });
      const [status, setStatus] = React.useState("Cargando Google Sheets...");
      const [loading, setLoading] = React.useState(false);

      const person = people[activePerson];
      const plan = mealPlans[activePerson][activeDay];

      const loadLogs = async () => {
        try {
          setLoading(true);
          const res = await fetch(`${SHEET_API_URL}?action=list&t=${Date.now()}`);
          const data = await res.json();
          if (data.ok) {
            setLogs({ martin: [], mama: [], ...data.logs });
            setStatus("Conectado a Google Sheets");
          } else {
            setStatus("Error leyendo Google Sheets");
          }
        } catch (e) {
          setStatus("No se pudo conectar. Revisa permisos/URL del backend.");
        } finally {
          setLoading(false);
        }
      };

      React.useEffect(() => { loadLogs(); }, []);

      const currentLogs = logs[activePerson] || [];
      const latest = [...currentLogs].sort((a,b) => String(b.date).localeCompare(String(a.date)))[0];
      const avg7 = (() => {
        const nums = currentLogs.filter(x => x.weight).slice(-7).map(x => Number(x.weight));
        if (!nums.length) return "—";
        return (nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1);
      })();

      const addLog = async () => {
        const entry = { ...form, person: activePerson, id: crypto.randomUUID(), createdAt: new Date().toISOString() };
        if (!entry.date) return;
        setLoading(true);
        setStatus("Guardando...");
        try {
          await fetch(SHEET_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "add", entry }) });
          setForm({ date: todayISO(), weight: "", waist: "", steps: "", notes: "" });
          setStatus("Guardado en Google Sheets");
          await loadLogs();
        } catch(e) {
          setStatus("No se pudo guardar en Google Sheets");
        } finally { setLoading(false); }
      };

      const deleteLog = async (id) => {
        setLoading(true);
        try {
          await fetch(SHEET_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: "delete", id }) });
          await loadLogs();
        } catch(e) { setStatus("No se pudo eliminar"); }
        finally { setLoading(false); }
      };

      const downloadCSV = () => {
        const rows = ["id,person,date,weight,waist,steps,notes,createdAt"];
        Object.keys(logs).forEach(p => logs[p].forEach(r => rows.push([r.id,p,r.date,r.weight,r.waist,r.steps,`"${String(r.notes||"").replaceAll('"','""')}"`,r.createdAt].join(","))));
        const blob = new Blob([rows.join("\n")], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "nutricion-morfe-registros.csv";
        a.click();
      };

      return <div className="min-h-screen p-4 md:p-8 text-neutral-950">
        <main className="max-w-6xl mx-auto space-y-5">
          <header className="flex justify-between items-start gap-3">
            <div>
              <p className="text-sm text-neutral-500">Plan familiar de definición</p>
              <h1 className="text-4xl md:text-6xl font-black tracking-tight">Nutrición Morfe</h1>
              <p className="text-sm text-neutral-500 mt-2">{status}</p>
            </div>
            <div className="flex gap-2">
              <button onClick={loadLogs} className="rounded-2xl bg-white px-4 py-3 shadow-sm border">{loading ? "..." : "Sync"}</button>
              <button onClick={downloadCSV} className="rounded-2xl bg-neutral-950 text-white px-4 py-3 shadow-sm">CSV</button>
            </div>
          </header>

          <section className="grid md:grid-cols-2 gap-4">
            {Object.entries(people).map(([key,p]) => <button key={key} onClick={()=>setActivePerson(key)} className={`text-left rounded-[2rem] p-5 bg-gradient-to-br ${p.card} border ${activePerson === key ? "border-neutral-950" : "border-transparent"} shadow-sm`}>
              <div className="flex justify-between items-center">
                <div className="flex items-center gap-3"><div className="w-14 h-14 bg-white/80 rounded-full grid place-items-center text-3xl font-black">{p.icon}</div><div><h2 className="text-2xl font-black">{p.label}</h2><p className="text-sm text-neutral-600">{p.goal}</p></div></div>
                <div className={`${p.chip} w-12 h-12 rounded-full grid place-items-center font-black`}>{key === "martin" ? "H" : "M"}</div>
              </div>
              <div className="grid grid-cols-2 gap-3 mt-5"><div className="bg-white/70 rounded-2xl p-3"><p className="text-xs text-neutral-500">Calorías</p><b>{p.calories}</b></div><div className="bg-white/70 rounded-2xl p-3"><p className="text-xs text-neutral-500">Proteína</p><b>{p.protein}</b></div></div>
            </button>)}
          </section>

          <section className="grid lg:grid-cols-3 gap-4">
            <div className="lg:col-span-2 bg-white rounded-[2rem] p-5 shadow-sm">
              <div className="flex flex-wrap justify-between items-center gap-3 mb-5">
                <div><h3 className="text-2xl font-black">Plan diario</h3><p className="text-neutral-500 text-sm">{person.label} · {activeDay} · {plan.tag}</p></div>
                <div className="flex gap-2 overflow-x-auto hide-scroll">{days.map(d => <button key={d} onClick={()=>setActiveDay(d)} className={`px-3 py-2 rounded-xl text-sm ${activeDay===d ? "bg-neutral-950 text-white" : "bg-neutral-100"}`}>{d.slice(0,3)}</button>)}</div>
              </div>
              <div className="grid sm:grid-cols-2 gap-3">{Object.entries(plan.meals).map(([meal,text]) => <div key={meal} className="rounded-3xl bg-neutral-100 p-4"><h4 className="font-black mb-2">🍽️ {meal}</h4><p className="text-sm text-neutral-700 leading-relaxed">{text}</p></div>)}</div>
            </div>

            <div className="bg-white rounded-[2rem] p-5 shadow-sm space-y-4">
              <div><h3 className="text-2xl font-black">Progreso</h3><p className="text-neutral-500 text-sm">Guardado compartido</p></div>
              <div className="grid grid-cols-2 gap-3"><div className="bg-lime-100 rounded-3xl p-4"><p className="text-xs text-neutral-500">Último peso</p><p className="text-2xl font-black">{latest?.weight || "—"}<span className="text-sm"> kg</span></p></div><div className="bg-neutral-100 rounded-3xl p-4"><p className="text-xs text-neutral-500">Prom. 7 logs</p><p className="text-2xl font-black">{avg7}<span className="text-sm"> kg</span></p></div></div>
              <input className="w-full rounded-2xl bg-neutral-100 p-3" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
              <div className="grid grid-cols-2 gap-2"><input className="rounded-2xl bg-neutral-100 p-3" placeholder="Peso kg" value={form.weight} onChange={e=>setForm({...form,weight:e.target.value})}/><input className="rounded-2xl bg-neutral-100 p-3" placeholder="Cintura cm" value={form.waist} onChange={e=>setForm({...form,waist:e.target.value})}/></div>
              <input className="w-full rounded-2xl bg-neutral-100 p-3" placeholder="Pasos" value={form.steps} onChange={e=>setForm({...form,steps:e.target.value})}/>
              <textarea className="w-full rounded-2xl bg-neutral-100 p-3 min-h-20" placeholder="Notas: hambre, fuerza, sueño..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
              <button disabled={loading} onClick={addLog} className="w-full rounded-2xl bg-neutral-950 text-white p-3 font-bold">+ Guardar registro</button>
            </div>
          </section>

          <section className="bg-white rounded-[2rem] p-5 shadow-sm overflow-hidden">
            <h3 className="text-2xl font-black mb-4">Historial de {person.label}</h3>
            <div className="overflow-x-auto"><table className="w-full text-sm"><thead><tr className="text-left text-neutral-500 border-b"><th className="py-3">Fecha</th><th>Peso</th><th>Cintura</th><th>Pasos</th><th>Notas</th><th></th></tr></thead><tbody>{[...currentLogs].sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(r => <tr key={r.id} className="border-b last:border-0"><td className="py-3 font-bold">{r.date}</td><td>{r.weight ? `${r.weight} kg` : "—"}</td><td>{r.waist ? `${r.waist} cm` : "—"}</td><td>{r.steps || "—"}</td><td className="max-w-xs truncate">{r.notes || "—"}</td><td><button onClick={()=>deleteLog(r.id)} className="p-2">🗑️</button></td></tr>)}</tbody></table></div>
          </section>

          <section className="rounded-[2rem] bg-neutral-950 text-white p-5"><h3 className="text-2xl font-black">Próxima fase: Gym</h3><p className="text-neutral-300 mt-2">Luego añadimos rutina por día, series, repeticiones, RIR, cargas y progreso.</p></section>
        </main>
      </div>
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
