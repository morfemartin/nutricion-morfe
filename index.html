<body class="text-white">
  <div id="root"></div>
  <script type="text/babel">
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycby9jIu1KAEwT2CdNI8zvU5afuazzQ38RenIZRMdAoXDT7uJLW-e3OhO_YYRmMs-by6W/exec";

    const days = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
    const mealOrder = ["Desayuno", "Almuerzo", "Merienda", "Cena"];
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const normalizeDate = (value) => String(value || "").slice(0, 10);
    const dayFromDate = (date = new Date()) => days[date.getDay() === 0 ? 6 : date.getDay() - 1];
    const clockLabel = (date = new Date()) => date.toLocaleTimeString("es-VE", { hour: "2-digit", minute: "2-digit" });
    const dateLabel = (iso) => {
      const date = iso ? new Date(`${iso}T12:00:00`) : new Date();
      return date.toLocaleDateString("es-VE", { weekday: "long", day: "numeric", month: "short" });
    };

    const mealFromHour = (date = new Date()) => {
      const hour = date.getHours();
      if (hour >= 5 && hour < 11) return "Desayuno";
      if (hour >= 11 && hour < 16) return "Almuerzo";
      if (hour >= 16 && hour < 19) return "Merienda";
      return "Cena";
    };

    const systemFromDate = (date = new Date()) => {
      const hour = date.getHours();
      if (hour >= 5 && hour < 10) return "morning";
      if (hour >= 10 && hour < 15) return "afternoon";
      return "night";
    };

    const systemMeta = {
      morning: { key: "morning", label: "Buenos dias", scene: "morning-hero", defaultMeal: "Desayuno", title: "Mañana", Icon: null },
      afternoon: { key: "afternoon", label: "Buenas tardes", scene: "afternoon-hero", defaultMeal: "Almuerzo", title: "Tarde", Icon: null },
      night: { key: "night", label: "Buenas noches", scene: "night-hero", defaultMeal: "Cena", title: "Noche", Icon: null },
    };

    const orderedSystems = (activeKey) => {
      const order = ["morning", "afternoon", "night"];
      const index = Math.max(0, order.indexOf(activeKey));
      return [...order.slice(index), ...order.slice(0, index)].map((key) => systemMeta[key]);
    };

    const SunIcon = () => <svg viewBox="0 0 64 64" className="h-7 w-7" aria-hidden="true">
      <circle cx="32" cy="32" r="12" fill="currentColor" />
      <path d="M32 4v9M32 51v9M4 32h9M51 32h9M12 12l7 7M45 45l7 7M52 12l-7 7M19 45l-7 7" stroke="currentColor" strokeWidth="7" strokeLinecap="round" />
    </svg>;

    const SunsetIcon = () => <svg viewBox="0 0 64 64" className="h-7 w-7" aria-hidden="true">
      <path d="M14 31h36" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M20 42h24" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M26 53h12" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M22 29a10 10 0 0 1 20 0" fill="none" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M32 5v8M12 17l6 6M52 17l-6 6" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
    </svg>;

    const MoonIcon = () => <svg viewBox="0 -960 960 960" className="h-7 w-7" aria-hidden="true">
      <path fill="currentColor" d="M484-80q-84 0-157.5-32t-128-86.5Q144-253 112-326.5T80-484q0-128 72-232t193-146q22-8 41 5.5t18 36.5q-3 85 27 162t90 137q60 60 137 90t162 27q26-1 38.5 17.5T863-345q-44 120-147.5 192.5T484-80Zm0-80q88 0 163-44t118-121q-86-8-163-43.5T464-465q-61-61-97-138t-43-163q-77 43-120.5 118.5T160-484q0 135 94.5 229.5T484-160Zm-20-305Z" />
    </svg>;

    systemMeta.morning.Icon = SunIcon;
    systemMeta.afternoon.Icon = SunsetIcon;
    systemMeta.night.Icon = MoonIcon;

    const shiftItem = (items, current, direction) => {
      const index = items.indexOf(current);
      return items[(index + direction + items.length) % items.length];
    };

    const ingredientEmoji = (text) => {
      const value = text.toLowerCase();
      if (value.includes("huevo") || value.includes("perico")) return "🥚";
      if (value.includes("pollo")) return "🍗";
      if (value.includes("carne")) return "🥩";
      if (value.includes("arroz")) return "🍚";
      if (value.includes("lenteja")) return "🫘";
      if (value.includes("pan") || value.includes("arepa") || value.includes("harina")) return "🫓";
      if (value.includes("sopa")) return "🍲";
      if (value.includes("aguacate")) return "🥑";
      if (value.includes("queso")) return "🧀";
      if (value.includes("plátano")) return "🍌";
      if (value.includes("hígado") || value.includes("pasta")) return "🥫";
      if (value.includes("tomate")) return "🍅";
      return "🍽️";
    };

    const parseIngredientItems = (text) => {
      const cleaned = String(text || "").replace(/^([^:]+):\s*/, "");
      return cleaned.split(/\s+\+\s+/).map((part) => {
        const item = part.trim();
        const amount = item.match(/(\d+(?:[–-]\d+)?(?:\s?g| huevos?| km)?)/i)?.[1] || "";
        const title = amount && /huevos?/i.test(amount)
          ? item.replace(/^\d+(?:[–-]\d+)?\s*/i, "").replace(/^huevos?/i, "Huevos").trim()
          : item.replace(amount, "").replace(/^de\s+/i, "").trim();
        return {
          emoji: ingredientEmoji(item),
          title: title || item,
          amount,
        };
      }).filter((item) => item.title);
    };

    const estimateGoalEta = (weights, target) => {
      const clean = weights.filter((x) => x.weight).map((x) => ({ date: normalizeDate(x.date), weight: Number(x.weight) })).filter((x) => x.date && x.weight);
      if (clean.length < 2) return "Registra 2 pesos para calcular la fecha";
      const newest = clean[0];
      const older = clean[Math.min(clean.length - 1, 6)];
      const daysBetween = Math.max(1, (new Date(`${newest.date}T12:00:00`) - new Date(`${older.date}T12:00:00`)) / 86400000);
      const weeklyLoss = ((older.weight - newest.weight) / daysBetween) * 7;
      const remaining = newest.weight - target;
      if (remaining <= 0) return "Objetivo alcanzado";
      if (weeklyLoss <= 0.05) return "Aún falta ritmo de bajada para estimar";
      const totalDays = Math.ceil((remaining / weeklyLoss) * 7);
      const months = Math.floor(totalDays / 30);
      const daysLeft = totalDays % 30;
      return `${months} meses + ${daysLeft} días aprox.`;
    };

    const mealMeta = {
      Desayuno: { emoji: "☀️", accent: "from-amber-200 to-orange-100", hint: "Energía limpia" },
      Almuerzo: { emoji: "🍛", accent: "from-emerald-200 to-lime-100", hint: "Fuerte y completo" },
      Merienda: { emoji: "🥪", accent: "from-sky-200 to-cyan-100", hint: "Antojo controlado" },
      Cena: { emoji: "🌙", accent: "from-indigo-200 to-violet-100", hint: "Cerrar sin pasarse" },
    };

    const people = {
      martin: {

        goal: "84 kg → 80 kg → 77–78 kg",
        calories: "2250–2350 kcal",

        hero: "from-emerald-400 via-lime-300 to-cyan-300",
        chip: "bg-emerald-950 text-white",
        start: 84,
        target: 80,
        progressRange: 6,
      },
      mama: {
        label: "Aquilorub",
        avatar: "🌷",
        goal: "79 kg → 76–77 kg → 74–75 kg",
        calories: "1550–1750 kcal",
        protein: "100–120 g proteína",
        hero: "from-rose-300 via-fuchsia-200 to-amber-200",
        chip: "bg-rose-950 text-white",
        start: 79,
        target: 76,
        progressRange: 6,
      },
    };

    const routines = {
      martin: {
        Lunes: { icon: "🏋️", type: "Fuerza", title: "Gym: hombros + torso", detail: "Prioridad estética: hombros/cintura. Evita presión abdominal por las hernias." },
        Martes: { icon: "🏃", type: "Cardio", title: "Running de calidad", detail: "Calentamiento suave, bloque de intensidad y vuelta a la calma." },
        Miércoles: { icon: "💪", type: "Fuerza", title: "Gym: pecho + brazos", detail: "Volumen controlado, técnica limpia y abdomen sin valsalva fuerte." },
        Jueves: { icon: "🦾", type: "Fuerza", title: "Gym: hombros + antebrazo", detail: "Día clave para la prioridad visual. Cargas progresivas sin forzar core." },
        Viernes: { icon: "🔥", type: "Fuerza", title: "Gym: pierna + torso", detail: "Trabajo completo, sin ejercicios que molesten la hernia." },
        Sábado: { icon: "🚶", type: "Activo", title: "Descanso activo", detail: "Pasos, movilidad y recuperación. Nada heroico." },
        Domingo: { icon: "🏁", type: "Fondo", title: "10 km+", detail: "Cardio largo con comida suficiente antes y después." },
      },
      mama: {
        Lunes: { icon: "🏋️", type: "Fuerza", title: "Gym simple", detail: "Cuerpo completo, técnica cómoda y sensación de avance." },
        Martes: { icon: "🚶", type: "Cardio", title: "Caminata / pasos", detail: "Actividad suave para mover gasto sin fatigar." },
        Miércoles: { icon: "💪", type: "Fuerza", title: "Gym simple", detail: "Fuerza básica y controlada para proteger músculo." },
        Jueves: { icon: "🏋️", type: "Fuerza", title: "Gym simple", detail: "Rutina compartida con Martín, adaptando cargas." },
        Viernes: { icon: "✨", type: "Fuerza", title: "Gym simple", detail: "Cerrar la semana con constancia, no con castigo." },
        Sábado: { icon: "🌿", type: "Activo", title: "Descanso activo", detail: "Paseo, movilidad o tareas ligeras." },
        Domingo: { icon: "👟", type: "Cardio", title: "Caminata larga", detail: "Movimiento tranquilo y buena hidratación." },
      },
    };

    const mealPlans = {
      martin: {
        Lunes: { meals: { Desayuno: "Arepa/pan + perico: 70 g harina o 100 g pan + 3 huevos + tomate", Almuerzo: "Pollo + arroz + lentejas: 200 g pollo + 180 g arroz + 150 g lentejas", Merienda: "Pan + pasta de hígado + mayonesa: 70–80 g pan + 30 g pasta + 10 g mayonesa", Cena: "Sopa abundante + 180–200 g pollo" } },
        Martes: { meals: { Desayuno: "Arepa/pan + huevos fritos: 70 g harina o 100 g pan + 3 huevos", Almuerzo: "Carne molida + arroz + lentejas: 170 g carne + 180 g arroz + 150 g lentejas", Merienda: "3 huevos cocidos", Cena: "Pollo + aguacate + sopa: 200 g pollo + 50 g aguacate + sopa" } },
        Miércoles: { meals: { Desayuno: "4 huevos cocidos o 3 huevos con tomate", Almuerzo: "Pollo + lentejas + arroz: 200 g pollo + 200 g lentejas + 120–150 g arroz", Merienda: "70 g pan + 30 g queso o 2 huevos", Cena: "Sopa + 150 g carne molida" } },
        Jueves: { meals: { Desayuno: "Arepa/pan + perico: 70 g harina o 100 g pan + 3 huevos + tomate", Almuerzo: "Pollo + arroz + aguacate: 220 g pollo + 180 g arroz + 50 g aguacate", Merienda: "Pan + pasta de hígado + mayonesa: 70 g pan + 30 g pasta + 10 g mayonesa", Cena: "Carne molida + lentejas + arepa/pan: 160 g carne + 180 g lentejas + 50 g harina o 75 g pan" } },
        Viernes: { meals: { Desayuno: "Arepa/pan + huevos fritos: 70 g harina o 100 g pan + 3 huevos", Almuerzo: "Carne molida + arroz + queso: 170 g carne + 200 g arroz + 30 g queso", Merienda: "3 huevos cocidos", Cena: "Pollo + sopa + plátano: 180–200 g pollo + sopa + 150 g plátano" } },
        Sábado: { meals: { Desayuno: "Arepa/pan + perico: 70 g harina + 3 huevos", Almuerzo: "Hígado + arroz + lentejas: 180–200 g hígado + 180 g arroz + 150 g lentejas", Merienda: "Pan + queso: 70–80 g pan + 30 g queso", Cena: "Pollo + sopa/aguacate: 200 g pollo + sopa + 40–50 g aguacate" } },
        Domingo: { meals: { Desayuno: "Pre-carrera: 80–100 g pan o 50–60 g harina de arepa", Almuerzo: "Post-carrera: 220 g pollo + 250–300 g arroz + 120–150 g lentejas", Merienda: "Arepa/pan + huevos: 60 g harina o 90 g pan + 2–3 huevos", Cena: "Sopa + pollo + plátano: sopa + 180 g pollo + 150 g plátano" } },
      },
      mama: {
        Lunes: { meals: { Desayuno: "Arepa + perico: 45–50 g harina + 2 huevos + tomate", Almuerzo: "Pollo + arroz + lentejas: 140 g pollo + 110 g arroz + 130 g lentejas", Merienda: "Pan + pasta de hígado + mayonesa: 50–60 g pan + 20–25 g pasta + 5–8 g mayonesa", Cena: "Sopa abundante + 120–140 g pollo" } },
        Martes: { meals: { Desayuno: "2 huevos cocidos + tomate + 30 g queso opcional", Almuerzo: "Carne molida + arroz + lentejas: 120 g carne + 100–120 g arroz + 130 g lentejas", Merienda: "Arepa pequeña con queso: 40 g harina + 25 g queso", Cena: "Pollo + aguacate + sopa: 130 g pollo + 40 g aguacate + sopa" } },
        Miércoles: { meals: { Desayuno: "Arepa + huevos/perico: 45 g harina + 2 huevos", Almuerzo: "Pollo + lentejas: 150 g pollo + 170 g lentejas + tomate/vegetales", Merienda: "1–2 huevos o 30 g queso", Cena: "Sopa abundante + 100–120 g carne molida" } },
        Jueves: { meals: { Desayuno: "Arepa + perico: 50 g harina + 2 huevos + tomate", Almuerzo: "Pollo + arroz + aguacate: 150 g pollo + 120 g arroz + 35–40 g aguacate", Merienda: "Pan + pasta de hígado + mayonesa: 50 g pan + 20 g pasta + 5–8 g mayonesa", Cena: "Lentejas + huevo/pollo: 170 g lentejas + 1 huevo o 100 g pollo" } },
        Viernes: { meals: { Desayuno: "2 huevos + arepa pequeña: 40 g harina", Almuerzo: "Carne molida + arroz + tomate: 130 g carne + 120 g arroz + tomate", Merienda: "30 g queso o 2 huevos", Cena: "Sopa + pollo + plátano: 120 g pollo + sopa + 80–100 g plátano" } },
        Sábado: { meals: { Desayuno: "Arepa + perico: 45–50 g harina + 2 huevos", Almuerzo: "Hígado + arroz + lentejas: 120–150 g hígado + 100 g arroz + 120 g lentejas", Merienda: "Pan pequeño con queso: 50 g pan + 20–25 g queso", Cena: "Pollo + sopa/vegetales: 130–150 g pollo + sopa" } },
        Domingo: { meals: { Desayuno: "Arepa + huevos: 50–55 g harina + 2 huevos", Almuerzo: "Proteína + arroz + lentejas: 140 g pollo/carne + 130 g arroz + 130 g lentejas", Merienda: "Opción ligera: fruta si hay, huevo o queso", Cena: "Sopa + pollo: sopa + 120–140 g pollo" } },
      }
    };

    function App() {
      const now = new Date();
      const [activePerson, setActivePerson] = React.useState("martin");
      const [activeDay, setActiveDay] = React.useState(dayFromDate(now));
      const [activeMeal, setActiveMeal] = React.useState(mealFromHour(now));
      const [activeSystem, setActiveSystem] = React.useState(systemFromDate(now));
      const [routineType, setRoutineType] = React.useState("");
      const [showFullDay, setShowFullDay] = React.useState(false);
      const [logs, setLogs] = React.useState({ martin: [], mama: [] });
      const [form, setForm] = React.useState({ date: todayISO(), weight: "", waist: "", steps: "", notes: "" });
      const [status, setStatus] = React.useState("Cargando registros...");
      const [loading, setLoading] = React.useState(false);
      const [clock, setClock] = React.useState(clockLabel(now));

      const person = people[activePerson];
      const dayPlan = mealPlans[activePerson][activeDay];
      const mealText = dayPlan.meals[activeMeal] || Object.values(dayPlan.meals)[0];
      const meal = mealMeta[activeMeal] || mealMeta.Desayuno;
      const routine = routines[activePerson][activeDay];
      const selectedRoutineType = routineType || routine.type;

      React.useEffect(() => {
        const timer = setInterval(() => setClock(clockLabel()), 30000);
        return () => clearInterval(timer);
      }, []);

      React.useEffect(() => {
        setRoutineType(routines[activePerson][activeDay].type);
      }, [activePerson, activeDay]);

      const loadLogs = async () => {
        try {
          setLoading(true);
          const res = await fetch(`${SHEET_API_URL}?action=list&t=${Date.now()}`);
          const data = await res.json();
          if (data.ok) {
            setLogs({ martin: [], mama: [], ...data.logs });
            setStatus("Sincronizado");
          } else {
            setStatus("Error al leer registros");
          }
        } catch (e) {
          setStatus("Sin conexión con el backend");
        } finally {
          setLoading(false);
        }
      };

      React.useEffect(() => { loadLogs(); }, []);

      const currentLogs = logs[activePerson] || [];
      const sortedLogs = [...currentLogs].sort((a, b) => normalizeDate(b.date).localeCompare(normalizeDate(a.date)));
      const latest = sortedLogs[0];
      const todaysLogs = currentLogs.filter((log) => normalizeDate(log.date) === form.date);
      const numericWeights = sortedLogs.filter((x) => x.weight).slice(0, 7).map((x) => Number(x.weight)).filter(Boolean);
      const avg7 = numericWeights.length ? (numericWeights.reduce((a, b) => a + b, 0) / numericWeights.length).toFixed(1) : "—";
      const latestWeight = latest?.weight ? Number(latest.weight) : null;
      const remainingToGoal = latestWeight ? Math.max(0, latestWeight - person.target) : person.progressRange;
      const progress = latestWeight ? Math.max(0, Math.min(100, ((person.progressRange - remainingToGoal) / person.progressRange) * 100)) : 0;
      const ringProgress = Math.round(progress);
      const goalEta = estimateGoalEta(sortedLogs, person.target);
      const timeMeta = systemMeta[activeSystem];
      const systems = orderedSystems(activeSystem);
      const mealItems = parseIngredientItems(mealText);
      const sparkWeights = [...currentLogs].filter((x) => x.weight).slice(-8).map((x) => Number(x.weight)).filter(Boolean);
      const minSpark = sparkWeights.length ? Math.min(...sparkWeights) : 0;
      const maxSpark = sparkWeights.length ? Math.max(...sparkWeights) : 1;

      const setToday = () => {
        const date = new Date();
        setForm((prev) => ({ ...prev, date: todayISO() }));
        setActiveDay(dayFromDate(date));
        setActiveMeal(mealFromHour(date));
        setActiveSystem(systemFromDate(date));
      };

      const handleDate = (value) => {
        setForm({ ...form, date: value });
        if (value) setActiveDay(dayFromDate(new Date(`${value}T12:00:00`)));
      };

      const moveDay = (direction) => setActiveDay(shiftItem(days, activeDay, direction));
      const moveMeal = (direction) => setActiveMeal(shiftItem(mealOrder, activeMeal, direction));
      const selectSystem = (key) => {
        const nextSystem = systemMeta[key];
        setActiveSystem(key);
        setActiveMeal(nextSystem.defaultMeal);
      };

      const addLog = async () => {
        if (!form.date) return;
        const metadata = [
          `Día: ${activeDay}`,
          `Hora: ${clock}`,
          `Comida: ${activeMeal}`,
          `Rutina: ${selectedRoutineType} - ${routine.title}`,
        ].join(" · ");

        const entry = {
          ...form,
          person: activePerson,
          id: crypto.randomUUID(),
          createdAt: new Date().toISOString(),
          dayName: activeDay,
          mealType: activeMeal,
          routineType: selectedRoutineType,
          notes: form.notes ? `${metadata}\n${form.notes}` : metadata,
        };

        setLoading(true);
        setStatus("Guardando...");
        try {
          await fetch(SHEET_API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "add", entry })
          });
          setForm({ date: todayISO(), weight: "", waist: "", steps: "", notes: "" });
          setStatus("Guardado");
          await loadLogs();
        } catch(e) {
          setStatus("No se pudo guardar");
        } finally {
          setLoading(false);
        }
      };

      const deleteLog = async (id) => {
        setLoading(true);
        try {
          await fetch(SHEET_API_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "delete", id })
          });
          await loadLogs();
        } catch(e) {
          setStatus("No se pudo eliminar");
        } finally {
          setLoading(false);
        }
      };

      const downloadCSV = () => {
        const rows = ["id,person,date,weight,waist,steps,notes,createdAt"];
        Object.keys(logs).forEach(p => logs[p].forEach(r => rows.push([r.id, p, r.date, r.weight, r.waist, r.steps, `"${String(r.notes || "").replaceAll('"','""')}"`, r.createdAt].join(","))));
        const blob = new Blob([rows.join("\n")], { type: "text/csv" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "nutricion-morfe-registros.csv";
        a.click();
      };

      return <div className="min-h-screen text-white">
          <section className={`relative overflow-hidden bg-gradient-to-br ${timeMeta.scene} px-5 pb-12 pt-4 text-white md:px-8`}>
            {activeSystem === "night" && <div aria-hidden="true">
              <span className="night-glow-halo"></span>
              <span className="night-glow-core"></span>
              <span className="night-glow-veil"></span>
              <span className="night-star h-1 w-1 left-[12%] top-[22%]"></span>
              <span className="night-star h-1.5 w-1.5 left-[27%] top-[13%]"></span>
              <span className="night-star h-1 w-1 left-[41%] top-[30%]"></span>
              <span className="night-star h-1.5 w-1.5 right-[22%] top-[18%]"></span>
              <span className="night-star h-1 w-1 right-[10%] top-[37%]"></span>
              <span className="night-star h-1 w-1 left-[63%] bottom-[28%]"></span>
            </div>}
            {activeSystem === "morning" && <div aria-hidden="true">
              <span className="morning-sun-halo"></span>
              <span className="morning-sun-core"></span>
              <span className="morning-sun-veil"></span>
            </div>}
            {activeSystem === "afternoon" && <div aria-hidden="true">
              <span className="afternoon-sun-halo"></span>
              <span className="afternoon-sun-core"></span>
              <span className="afternoon-sun-veil"></span>
            </div>}
            <div className="relative mx-auto max-w-6xl">
            <div className="flex items-start justify-between gap-3">
              <div className="flex items-center gap-3 text-white/95">
                {systems.map((system) => {
                  const Icon = system.Icon;
                  const selected = activeSystem === system.key;
                  return <button type="button" key={system.key} onClick={() => selectSystem(system.key)} className={`tap grid h-8 w-8 place-items-center rounded-full outline-none focus-visible:ring-1 focus-visible:ring-white/55 ${selected ? "text-white" : "text-white/55"}`} aria-label={`Cambiar a sistema ${system.title}`} title={system.title}>
                    <Icon />
                  </button>;
                })}
              </div>
              <div className="flex rounded-full bg-white/15 p-1 shadow-[0_8px_24px_rgba(0,0,0,.18)] ring-1 ring-white/45 backdrop-blur-xl">
                {Object.entries(people).map(([key, p]) => <button key={key} onClick={() => setActivePerson(key)} className={`tap grid h-6 w-6 place-items-center rounded-full text-[11px] outline-none focus-visible:ring-1 focus-visible:ring-white/60 ${activePerson === key ? "bg-white/20 text-white shadow-inner" : "text-white/70"}`} title={p.label}>{p.avatar}</button>)}
              </div>
            </div>

            <div className="mt-2 grid grid-cols-[1fr_151px] gap-3">
              <div className="min-w-0 pt-4">
                <h2 className="text-[40px] font-normal leading-[1.02] tracking-normal text-white md:text-[56px]">{timeMeta.label},<br />{person.label}</h2>
                <div className="mt-10 max-w-[218px]">
                  <p className="glow-text text-[12px] font-normal uppercase leading-tight text-white">Objetivo final</p>
                  <p className="glow-text mt-1 text-[13px] font-normal leading-tight text-white">{goalEta}</p>
                </div>
              </div>

              <div className="relative grid h-[151px] w-[151px] place-items-center">
                <svg className="absolute inset-0 h-full w-full -rotate-90 overflow-visible" viewBox="0 0 116 116" aria-hidden="true">
                  <circle cx="58" cy="58" r="43" fill="rgba(255,255,255,.08)" />
                  <circle cx="58" cy="58" r="43" fill="none" stroke="rgba(255,255,255,.30)" strokeWidth="12" />
                  <circle cx="58" cy="58" r="43" fill="none" stroke="#34d399" strokeWidth="12" strokeLinecap="round" strokeDasharray={`${2 * Math.PI * 43}`} strokeDashoffset={`${2 * Math.PI * 43 * (1 - ringProgress / 100)}`} style={{ filter: "drop-shadow(0 0 8px rgba(52,211,153,.75))" }} />
                </svg>
                <div className="relative grid h-[94px] w-[94px] place-items-center text-center">
                  <div>
                    <p className="glow-text text-3xl font-normal leading-none text-white">{latestWeight || "—"}</p>
                    <p className="glow-text mt-1 text-[8px] font-normal uppercase leading-none text-white">Peso actual</p>
                  </div>
                </div>
              </div>
            </div>

            </div>
          </section>

        <main className="mx-auto max-w-6xl space-y-4 px-4 py-4 md:space-y-5 md:px-8 md:py-6">
          <section className="grid gap-4 md:grid-cols-[.92fr_1.08fr]">
            <div className="grid gap-4 md:contents">
              <div className="space-y-4">
                <div className="rounded-[1.45rem] bg-black/20 p-2 text-white shadow-[inset_0_1px_0_rgba(255,255,255,.08)] ring-1 ring-white/10 backdrop-blur-xl">
                  <div className="flex items-center justify-between gap-3">
                    <button onClick={() => moveDay(-1)} className="tap grid h-9 w-9 place-items-center rounded-full bg-white/10 text-xl text-white/85 shadow-[inset_0_1px_0_rgba(255,255,255,.12)] ring-1 ring-white/10">‹</button>
                    <div className="text-center">
                      <h3 className="text-xl font-normal leading-tight text-white">{activeDay}</h3>
                    </div>
                    <button onClick={() => moveDay(1)} className="tap grid h-9 w-9 place-items-center rounded-full bg-white/10 text-xl text-white/85 shadow-[inset_0_1px_0_rgba(255,255,255,.12)] ring-1 ring-white/10">›</button>
                  </div>
                </div>

                <div className="rounded-[1.7rem] bg-white/10 p-4 text-white ring-1 ring-white/10">
                  <div className="mb-3">
                    <p className="text-xs font-normal uppercase text-white/50">Plan de comida</p>
                  </div>
                  <div className="mb-3 flex items-center justify-between gap-3 rounded-[1.4rem] bg-white/10 p-2">
                    <button onClick={() => moveMeal(-1)} className="tap grid h-10 w-10 place-items-center rounded-2xl bg-white/15 text-white">‹</button>
                    <div className="text-center">
                      <p className="text-xs font-normal uppercase text-white/50">{clock}</p>
                      <p className="text-2xl font-normal leading-tight">{meal.emoji} {activeMeal}</p>
                    </div>
                    <button onClick={() => moveMeal(1)} className="tap grid h-10 w-10 place-items-center rounded-2xl bg-white/15 text-white">›</button>
                  </div>
                  <div className="grid gap-2">
                    {mealItems.map((item, index) => <div key={`${item.title}-${index}`} className="relative rounded-2xl bg-white/10 p-3 pr-24 ring-1 ring-white/10">
                      <p className="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-normal leading-tight text-amber-200">{item.amount || "al gusto"}</p>
                      <div className="flex items-center gap-3">
                        <div className="grid h-10 w-10 place-items-center text-2xl">{item.emoji}</div>
                        <p className="text-sm font-normal leading-tight">{item.title}</p>
                      </div>
                    </div>)}
                  </div>
                </div>

                <div className="rounded-[1.7rem] bg-white/10 p-4 text-white ring-1 ring-white/10">
                  <div className="flex items-center justify-between gap-3">
                    <div>
                      <p className="text-xs font-normal uppercase text-white/50">Rutina actual</p>
                      <h3 className="text-2xl font-normal">{routine.icon} {routine.title}</h3>
                    </div>
                    <span className="rounded-full bg-white/15 px-3 py-1 text-xs font-normal">{selectedRoutineType}</span>
                  </div>
                  <p className="mt-2 text-sm leading-relaxed text-white/70">{routine.detail}</p>
                </div>
              </div>
            </div>
          </section>

          <section className="rounded-[2rem] glass p-5 shadow-sm">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <p className="text-sm font-light text-white/50">Registro rápido</p>
                <h3 className="text-2xl font-normal">{person.label}</h3>
              </div>
              <div className="flex items-center gap-2 text-xs font-light text-white/50">
                <span>{status}</span>
                <span className="rounded-2xl bg-white/10 px-3 py-2 text-white shadow-sm">{todaysLogs.length} hoy</span>
              </div>
            </div>

            <div className="mt-4 grid gap-2 md:grid-cols-6">
              <input className="rounded-2xl bg-white/10 p-3 font-light text-white outline-none ring-1 ring-white/10 md:col-span-2" type="date" value={form.date} onChange={e => handleDate(e.target.value)} />
              <input inputMode="decimal" className="rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Peso kg" value={form.weight} onChange={e => setForm({...form, weight: e.target.value})} />
              <input inputMode="decimal" className="rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Cintura cm" value={form.waist} onChange={e => setForm({...form, waist: e.target.value})} />
              <input inputMode="numeric" className="rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Pasos" value={form.steps} onChange={e => setForm({...form, steps: e.target.value})} />
              <button disabled={loading} onClick={addLog} className="tap rounded-2xl bg-white p-3 font-normal text-slate-950 shadow-lg shadow-black/15">{loading ? "Guardando..." : "+ Guardar"}</button>
              <textarea className="min-h-20 rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40 md:col-span-6" placeholder="Notas: hambre, fuerza, sueño..." value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} />
            </div>
          </section>

          <section className="grid gap-4 lg:grid-cols-[.85fr_1.15fr]">
            <div className="rounded-[2rem] glass p-5 shadow-sm">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-sm font-light text-white/50">Progreso visual</p>
                  <h3 className="text-2xl font-normal">{latest?.weight || "—"} kg</h3>
                </div>
                <div className="rounded-2xl bg-white/10 px-3 py-2 text-right shadow-sm">
                  <p className="text-xs font-light text-white/50">Prom. 7</p>
                  <p className="font-normal">{avg7} kg</p>
                </div>
              </div>
              <div className="mt-5 h-4 overflow-hidden rounded-full bg-white/10">
                <div className="h-full rounded-full bg-gradient-to-r from-emerald-500 to-lime-300" style={{ width: `${progress}%` }}></div>
              </div>
              <div className="mt-4 flex h-24 items-end gap-2 rounded-[1.4rem] bg-white/10 p-3">
                {sparkWeights.length ? sparkWeights.map((value, index) => {
                  const height = maxSpark === minSpark ? 52 : 28 + ((value - minSpark) / (maxSpark - minSpark)) * 52;
                  return <div key={`${value}-${index}`} className="flex-1 rounded-t-xl bg-gradient-to-t from-emerald-600 to-lime-300" style={{ height }} title={`${value} kg`}></div>
                }) : <div className="grid h-full w-full place-items-center text-sm font-light text-white/40">Sin pesos todavía</div>}
              </div>
              <div className="mt-4 grid grid-cols-2 gap-3">
                <div className="rounded-2xl bg-white/10 p-3"><p className="text-xs font-light text-white/50">Meta</p><p className="font-normal">{person.goal}</p></div>
                <div className="rounded-2xl bg-white/10 p-3"><p className="text-xs font-light text-white/50">Plan</p><p className="font-normal">{person.calories}</p></div>
              </div>
            </div>

            <div className="rounded-[2rem] glass p-5 shadow-sm">
              <div className="flex flex-wrap items-center justify-between gap-3">
                <div>
                  <p className="text-sm font-light text-white/50">Día y comida</p>
                  <h3 className="text-2xl font-normal">{activeDay}</h3>
                </div>
                <div className="flex max-w-full gap-2 overflow-x-auto hide-scroll">
                  {days.map(d => <button key={d} onClick={() => setActiveDay(d)} className={`tap shrink-0 rounded-2xl px-3 py-2 text-sm font-normal shadow-sm ${activeDay === d ? "bg-white text-slate-950" : "bg-white/10 text-white"}`}>{d.slice(0, 3)}</button>)}
                </div>
              </div>

              <div className="mt-4 grid gap-3 sm:grid-cols-2">
                {(showFullDay ? mealOrder : [activeMeal]).map((mealName) => <button key={mealName} onClick={() => setActiveMeal(mealName)} className={`tap rounded-[1.5rem] p-4 text-left shadow-sm ${activeMeal === mealName ? "bg-white text-slate-950" : "bg-white/10 text-white"}`}>
                  <div className="flex items-center gap-2">
                    <span className="text-2xl">{mealMeta[mealName].emoji}</span>
                    <h4 className="font-normal">{mealName}</h4>
                  </div>
                  <p className={`mt-2 text-sm leading-relaxed ${activeMeal === mealName ? "text-slate-600" : "text-white/60"}`}>{dayPlan.meals[mealName]}</p>
                </button>)}
              </div>

              <button onClick={() => setShowFullDay(!showFullDay)} className="tap mt-4 rounded-2xl bg-white/10 px-4 py-3 text-sm font-normal text-white shadow-sm">{showFullDay ? "Ver solo ahora" : "Ver todo el día"}</button>
            </div>
          </section>

          <section className="rounded-[2rem] glass p-5 shadow-sm">
            <div className="mb-4 flex items-center justify-between">
              <div>
                <p className="text-sm font-light text-white/50">Historial</p>
                <h3 className="text-2xl font-normal">{person.label}</h3>
              </div>
              <span className="rounded-2xl bg-white/10 px-3 py-2 text-sm font-normal shadow-sm">{currentLogs.length} total</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full min-w-[720px] text-sm">
                <thead><tr className="border-b border-white/10 text-left text-white/50"><th className="py-3">Fecha</th><th>Peso</th><th>Cintura</th><th>Pasos</th><th>Notas</th><th></th></tr></thead>
                <tbody>
                  {sortedLogs.slice(0, 12).map(r => <tr key={r.id} className="border-b border-white/10 last:border-0">
                    <td className="py-3 font-normal">{normalizeDate(r.date)}</td>
                    <td>{r.weight ? `${r.weight} kg` : "—"}</td>
                    <td>{r.waist ? `${r.waist} cm` : "—"}</td>
                    <td>{r.steps || "—"}</td>
                    <td className="max-w-sm truncate text-white/60">{r.notes || "—"}</td>
                    <td className="text-right"><button onClick={() => deleteLog(r.id)} className="tap rounded-xl bg-white/10 px-3 py-2 shadow-sm">🗑️</button></td>
                  </tr>)}
                  {!sortedLogs.length && <tr><td colSpan="6" className="py-8 text-center font-light text-slate-400">Todavía no hay registros</td></tr>}
                </tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
