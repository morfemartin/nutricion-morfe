<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#12b981" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    body {
      font-family: Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(244, 114, 182, .12), transparent 25rem),
        radial-gradient(circle at top right, rgba(59, 130, 246, .12), transparent 28rem),
        linear-gradient(180deg, #050509 0%, #0b0d13 54%, #050509 100%);
    }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .glass { background: rgba(255, 255, 255, .08); backdrop-filter: blur(18px); border: 1px solid rgba(255, 255, 255, .08); }
    .tap { transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
    .tap:active { transform: scale(.98); }
    .glow-text { text-shadow: 0 1px 10px rgba(0, 0, 0, .45); }
    .morning-hero {
      background:
        radial-gradient(ellipse at 82% 104%, rgba(255, 234, 108, .98) 0%, rgba(255, 178, 50, .86) 17%, rgba(247, 96, 18, .74) 35%, rgba(91, 10, 3, .9) 66%, rgba(32, 4, 0, 1) 100%),
        linear-gradient(150deg, #200400 0%, #5b0a03 48%, #f55f10 100%) !important;
    }
    .afternoon-hero {
      background:
        radial-gradient(ellipse at 78% 102%, rgba(255, 229, 97, .96) 0%, rgba(255, 190, 70, .82) 17%, rgba(247, 128, 42, .56) 34%, rgba(29, 78, 216, .38) 58%, rgba(7, 18, 54, .98) 100%),
        linear-gradient(150deg, #071236 0%, #12306f 45%, #ffd05b 100%) !important;
    }
    .night-hero {
      background:
        radial-gradient(ellipse at 77% 110%, rgba(97, 176, 255, .72) 0%, rgba(34, 94, 245, .58) 22%, rgba(16, 33, 104, .78) 48%, rgba(5, 8, 33, .98) 100%),
        linear-gradient(150deg, #050821 0%, #11194b 48%, #1d4ed8 100%) !important;
    }
    .morning-sun-halo,
    .morning-sun-core,
    .morning-sun-veil,
    .afternoon-sun-halo,
    .afternoon-sun-core,
    .afternoon-sun-veil,
    .night-glow-halo,
    .night-glow-core,
    .night-glow-veil {
      position: absolute;
      pointer-events: none;
      border-radius: 999px;
    }
    .morning-sun-halo {
      right: -10%;
      bottom: -42%;
      height: 17rem;
      width: 20rem;
      background: rgba(255, 229, 91, .42);
      filter: blur(24px);
    }
    .morning-sun-core {
      right: 7%;
      bottom: -31%;
      height: 9rem;
      width: 11rem;
      background: rgba(255, 236, 107, .92);
      filter: blur(13px);
    }
    .morning-sun-veil {
      right: 10%;
      bottom: -4%;
      height: 10rem;
      width: 20rem;
      background: rgba(250, 64, 10, .32);
      filter: blur(38px);
    }
    .afternoon-sun-halo {
      right: -10%;
      bottom: -42%;
      height: 16rem;
      width: 23rem;
      background: rgba(255, 174, 45, .38);
      filter: blur(25px);
    }
    .afternoon-sun-core {
      right: 7%;
      bottom: -31%;
      height: 8.5rem;
      width: 14rem;
      background: rgba(255, 210, 80, .82);
      filter: blur(15px);
    }
    .afternoon-sun-veil {
      right: 11%;
      bottom: -4%;
      height: 8.5rem;
      width: 23rem;
      background: rgba(59, 130, 246, .26);
      filter: blur(40px);
    }
    .night-glow-halo {
      right: -12%;
      bottom: -38%;
      height: 17rem;
      width: 22rem;
      background: rgba(96, 165, 250, .26);
      filter: blur(28px);
    }
    .night-glow-core {
      right: 9%;
      bottom: -30%;
      height: 9rem;
      width: 12rem;
      background: rgba(147, 197, 253, .38);
      filter: blur(18px);
    }
    .night-glow-veil {
      right: 20%;
      bottom: -4%;
      height: 9rem;
      width: 20rem;
      background: rgba(37, 99, 235, .28);
      filter: blur(42px);
    }
    .night-star {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 0 10px rgba(255, 255, 255, .82), 0 0 22px rgba(125, 211, 252, .42);
    }
    th, b, strong { font-weight: 400; }
  </style>
</head>
<body class="text-white">
  <div id="root"></div>
  <script type="text/babel">
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycby9jIu1KAEwT2CdNI8zvU5afuazzQ38RenIZRMdAoXDT7uJLW-e3OhO_YYRmMs-by6W/exec";
    const PLAN_DATA_URL = "./data/plans.v1.json";

    const days = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
    const mealOrder = ["Desayuno", "Almuerzo", "Merienda", "Cena"];
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const emptyBodyForm = () => ({ date: todayISO(), weight: "", waist: "", shoulders: "", chest: "", hip: "", arm: "", forearm: "", neck: "", leg: "", steps: "", notes: "" });
    const normalizeDate = (value) => String(value || "").slice(0, 10);
    const dayFromDate = (date = new Date()) => days[date.getDay() === 0 ? 6 : date.getDay() - 1];
    const isoFromLocalDate = (date) => date.toISOString().slice(0, 10);
    const dateForDayName = (targetDay, baseISO = todayISO()) => {
      const base = new Date(`${baseISO}T12:00:00`);
      const currentIndex = days.indexOf(dayFromDate(base));
      const targetIndex = days.indexOf(targetDay);
      if (currentIndex < 0 || targetIndex < 0) return baseISO;
      base.setDate(base.getDate() + targetIndex - currentIndex);
      return isoFromLocalDate(base);
    };
    const isRegisterDayISO = (iso) => Boolean(iso) && dayFromDate(new Date(`${iso}T12:00:00`)) === "Viernes";
    const clockLabel = (date = new Date()) => date.toLocaleTimeString("es-VE", { hour: "2-digit", minute: "2-digit" });
    const dateLabel = (iso) => {
      const date = iso ? new Date(`${iso}T12:00:00`) : new Date();
      return date.toLocaleDateString("es-VE", { weekday: "long", day: "numeric", month: "short" });
    };

    const mealFromHour = (date = new Date()) => {
      const hour = date.getHours();
      if (hour >= 5 && hour < 11) return "Desayuno";
      if (hour >= 11 && hour < 16) return "Almuerzo";
      if (hour >= 16 && hour < 19) return "Merienda";
      return "Cena";
    };

    const systemFromDate = (date = new Date()) => {
      const hour = date.getHours();
      if (hour >= 5 && hour < 10) return "morning";
      if (hour >= 10 && hour < 15) return "afternoon";
      return "night";
    };

    const systemMeta = {
      morning: { key: "morning", label: "Buenos dias", scene: "morning-hero", defaultMeal: "Desayuno", title: "Mañana", Icon: null },
      afternoon: { key: "afternoon", label: "Buenas tardes", scene: "afternoon-hero", defaultMeal: "Almuerzo", title: "Tarde", Icon: null },
      night: { key: "night", label: "Buenas noches", scene: "night-hero", defaultMeal: "Cena", title: "Noche", Icon: null },
    };

    const orderedSystems = (activeKey) => {
      const order = ["morning", "afternoon", "night"];
      const index = Math.max(0, order.indexOf(activeKey));
      return [...order.slice(index), ...order.slice(0, index)].map((key) => systemMeta[key]);
    };

    const SunIcon = () => <svg viewBox="0 0 64 64" className="h-7 w-7" aria-hidden="true">
      <circle cx="32" cy="32" r="12" fill="currentColor" />
      <path d="M32 4v9M32 51v9M4 32h9M51 32h9M12 12l7 7M45 45l7 7M52 12l-7 7M19 45l-7 7" stroke="currentColor" strokeWidth="7" strokeLinecap="round" />
    </svg>;

    const SunsetIcon = () => <svg viewBox="0 0 64 64" className="h-7 w-7" aria-hidden="true">
      <path d="M14 31h36" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M20 42h24" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M26 53h12" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M22 29a10 10 0 0 1 20 0" fill="none" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
      <path d="M32 5v8M12 17l6 6M52 17l-6 6" stroke="currentColor" strokeWidth="6" strokeLinecap="round" />
    </svg>;

    const MoonIcon = () => <svg viewBox="0 -960 960 960" className="h-7 w-7" aria-hidden="true">
      <path fill="currentColor" d="M484-80q-84 0-157.5-32t-128-86.5Q144-253 112-326.5T80-484q0-128 72-232t193-146q22-8 41 5.5t18 36.5q-3 85 27 162t90 137q60 60 137 90t162 27q26-1 38.5 17.5T863-345q-44 120-147.5 192.5T484-80Zm0-80q88 0 163-44t118-121q-86-8-163-43.5T464-465q-61-61-97-138t-43-163q-77 43-120.5 118.5T160-484q0 135 94.5 229.5T484-160Zm-20-305Z" />
    </svg>;

    systemMeta.morning.Icon = SunIcon;
    systemMeta.afternoon.Icon = SunsetIcon;
    systemMeta.night.Icon = MoonIcon;

    const shiftItem = (items, current, direction) => {
      const index = items.indexOf(current);
      return items[(index + direction + items.length) % items.length];
    };

    const ingredientEmoji = (text) => {
      const value = text.toLowerCase();
      if (value.includes("huevo") || value.includes("perico")) return "🥚";
      if (value.includes("pollo")) return "🍗";
      if (value.includes("carne")) return "🥩";
      if (value.includes("arroz")) return "🍚";
      if (value.includes("lenteja")) return "🫘";
      if (value.includes("pan") || value.includes("arepa") || value.includes("harina")) return "🫓";
      if (value.includes("sopa")) return "🍲";
      if (value.includes("aguacate")) return "🥑";
      if (value.includes("queso")) return "🧀";
      if (value.includes("plátano")) return "🍌";
      if (value.includes("hígado") || value.includes("pasta")) return "🥫";
      if (value.includes("tomate")) return "🍅";
      return "🍽️";
    };

    const parseIngredientItems = (text) => {
      const cleaned = String(text || "").replace(/^([^:]+):\s*/, "");
      return cleaned.split(/\s+\+\s+/).map((part) => {
        const item = part.trim();
        const amount = item.match(/(\d+(?:[–-]\d+)?(?:\s?g| huevos?| km)?)/i)?.[1] || "";
        const title = amount && /huevos?/i.test(amount)
          ? item.replace(/^\d+(?:[–-]\d+)?\s*/i, "").replace(/^huevos?/i, "Huevos").trim()
          : item.replace(amount, "").replace(/^de\s+/i, "").trim();
        return {
          emoji: ingredientEmoji(item),
          title: title || item,
          amount,
        };
      }).filter((item) => item.title);
    };

    const estimateGoalEta = (weights, target) => {
      const clean = weights.filter((x) => x.weight).map((x) => ({ date: normalizeDate(x.date), weight: Number(x.weight) })).filter((x) => x.date && x.weight);
      if (clean.length < 2) return "Registra 2 pesos para calcular la fecha";
      const newest = clean[0];
      const older = clean[Math.min(clean.length - 1, 6)];
      const daysBetween = Math.max(1, (new Date(`${newest.date}T12:00:00`) - new Date(`${older.date}T12:00:00`)) / 86400000);
      const weeklyLoss = ((older.weight - newest.weight) / daysBetween) * 7;
      const remaining = newest.weight - target;
      if (remaining <= 0) return "Objetivo alcanzado";
      if (weeklyLoss <= 0.05) return "Aún falta ritmo de bajada para estimar";
      const totalDays = Math.ceil((remaining / weeklyLoss) * 7);
      const months = Math.floor(totalDays / 30);
      const daysLeft = totalDays % 30;
      return `${months} meses + ${daysLeft} días aprox.`;
    };

    const mealMeta = {
      Desayuno: { emoji: "☀️", accent: "from-amber-200 to-orange-100", hint: "Energía limpia" },
      Almuerzo: { emoji: "🍛", accent: "from-emerald-200 to-lime-100", hint: "Fuerte y completo" },
      Merienda: { emoji: "🥪", accent: "from-sky-200 to-cyan-100", hint: "Antojo controlado" },
      Cena: { emoji: "🌙", accent: "from-indigo-200 to-violet-100", hint: "Cerrar sin pasarse" },
    };

    const measurementFields = [
      { key: "waist", label: "Cintura cm" },
      { key: "shoulders", label: "Hombros cm" },
      { key: "chest", label: "Pecho cm" },
      { key: "hip", label: "Cadera cm" },
      { key: "arm", label: "Bíceps cm" },
      { key: "forearm", label: "Antebrazo cm" },
      { key: "neck", label: "Cuello cm" },
      { key: "leg", label: "Pierna cm" },
    ];

    const people = {
      martin: {
        label: "Martín",
        avatar: "⚡",
        goal: "84 kg → 80 kg → 77–78 kg",
        calories: "2250–2350 kcal",
        protein: "160–175 g proteína",
        hero: "from-emerald-400 via-lime-300 to-cyan-300",
        chip: "bg-emerald-950 text-white",
        start: 84,
        target: 80,
        progressRange: 6,
      },
      mama: {
        label: "Aquilorub",
        avatar: "🌷",
        goal: "79 kg → 76–77 kg → 74–75 kg",
        calories: "1550–1750 kcal",
        protein: "100–120 g proteína",
        hero: "from-rose-300 via-fuchsia-200 to-amber-200",
        chip: "bg-rose-950 text-white",
        start: 79,
        target: 76,
        progressRange: 6,
      },
    };

    const definitionGoals = {
      martin: {
        phase: "Definición",
        startWeightKg: 84,
        targetWeightKgMin: 77.5,
        targetWeightKgMax: 80,
        startWaistCm: 86,
        targetWaistCmMin: 79,
        targetWaistCmMax: 82,
        startShouldersCm: 124.5,
        targetShouldersCm: 132,
        startRatio: 124.5 / 86,
        targetRatio: 1.6,
        calories: "2250-2350 kcal",
        weeklyLoss: "0.5-0.7 kg/sem",
      },
      mama: {
        phase: "Definición",
        startWeightKg: 79,
        targetWeightKgMin: 74,
        targetWeightKgMax: 76,
        startWaistCm: 86,
        targetWaistCmMin: 80,
        targetWaistCmMax: 82,
        startShouldersCm: 110,
        targetShouldersCm: 112,
        startRatio: 110 / 86,
        targetRatio: 1.38,
        calories: "1550-1750 kcal",
        weeklyLoss: "0.4-0.6 kg/sem",
      },
    };

    const muscleMeta = {
      Hombros: { color: "#a78bfa", glow: "rgba(167,139,250,.35)" },
      Pecho: { color: "#fb7185", glow: "rgba(251,113,133,.35)" },
      Espalda: { color: "#60a5fa", glow: "rgba(96,165,250,.35)" },
      Brazos: { color: "#f59e0b", glow: "rgba(245,158,11,.35)" },
      Antebrazo: { color: "#facc15", glow: "rgba(250,204,21,.3)" },
      Pierna: { color: "#34d399", glow: "rgba(52,211,153,.32)" },
      Abdomen: { color: "#f472b6", glow: "rgba(244,114,182,.3)" },
      Cardio: { color: "#22d3ee", glow: "rgba(34,211,238,.28)" },
    };

    const clamp = (value, min = 0, max = 100) => Math.max(min, Math.min(max, value));
    const numberValue = (value) => {
      const match = String(value ?? "").replace(",", ".").match(/-?\d+(?:\.\d+)?/);
      if (!match) return null;
      const number = Number(match[0]);
      return Number.isFinite(number) ? number : null;
    };
    const formatMetric = (value, decimals = 1) => {
      if (value === null || value === undefined || Number.isNaN(value)) return "—";
      return Number(value).toFixed(decimals).replace(/\.0$/, "");
    };
    const latestMetric = (entries, key, fallback) => {
      const found = entries.find((entry) => numberValue(entry[key]) !== null);
      return found ? numberValue(found[key]) : fallback;
    };
    const progressLower = (current, start, target) => {
      if (current === null || start === target) return 0;
      return clamp(((start - current) / (start - target)) * 100);
    };
    const progressHigher = (current, start, target) => {
      if (current === null || start === target) return 0;
      return clamp(((current - start) / (target - start)) * 100);
    };
    const closenessLower = (current, target) => current ? clamp((target / current) * 100) : 0;
    const closenessHigher = (current, target) => target ? clamp((current / target) * 100) : 0;
    const linePoints = (values, min, max, width = 280, height = 130) => {
      const pad = 12;
      const usableW = width - pad * 2;
      const usableH = height - pad * 2;
      const range = max === min ? 1 : max - min;
      return values.map((value, index) => {
        if (value === null || value === undefined) return null;
        const x = pad + (values.length === 1 ? usableW / 2 : (index / (values.length - 1)) * usableW);
        const y = pad + usableH - ((value - min) / range) * usableH;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).filter(Boolean).join(" ");
    };
    const muscleForExercise = (name = "", module = "") => {
      const text = `${name} ${module}`.toLowerCase();
      if (/running|caminata|cardio|trote|series|km/.test(text)) return "Cardio";
      if (/abdomen|abs|plancha|pallof|dead bug|crunch/.test(text)) return "Abdomen";
      if (/pierna|gemelo|pantorrilla|cuádriceps|cuadriceps|femoral|prensa|sentadilla|búlgar|bulgar|hip thrust|sissy/.test(text)) return "Pierna";
      if (/antebrazo|muñeca|agarre|pronación|pronacion|supinación|supinacion/.test(text)) return "Antebrazo";
      if (/bíceps|biceps|tríceps|triceps|curl|martillo|fondos/.test(text)) return "Brazos";
      if (/dominada|jalón|jalon|remo|pull-over|pullover|espalda/.test(text)) return "Espalda";
      if (/press|pecho|apertura|cruce|pec/.test(text)) return "Pecho";
      if (/hombro|lateral|face pull|deltoide|elevación|elevacion|reverse/.test(text)) return "Hombros";
      return "Hombros";
    };
    const workoutScore = (log) => {
      const weight = numberValue(log.weight);
      const reps = numberValue(log.reps);
      const duration = numberValue(log.duration);
      const distance = numberValue(log.distance);
      if (weight !== null) return weight;
      if (reps !== null) return reps;
      if (duration !== null) return duration;
      if (distance !== null) return distance;
      return 1;
    };
    const buildMusclePerformance = (workouts = []) => {
      const today = new Date(`${todayISO()}T12:00:00`);
      const buckets = {};
      workouts.forEach((log) => {
        const date = normalizeDate(log.date);
        if (!date) return;
        const daysAgo = Math.floor((today - new Date(`${date}T12:00:00`)) / 86400000);
        const week = Math.floor(Math.max(0, daysAgo) / 7);
        if (week > 7) return;
        const muscle = muscleMeta[log.muscle] ? log.muscle : muscleForExercise(log.exercise, log.module);
        const score = workoutScore(log);
        buckets[muscle] = buckets[muscle] || Array(8).fill(null);
        buckets[muscle][7 - week] = Math.max(buckets[muscle][7 - week] || 0, score);
      });
      return Object.keys(muscleMeta).map((name) => {
        const values = buckets[name] || Array(8).fill(null);
        const filled = values.filter((value) => value !== null);
        const latest = filled[filled.length - 1];
        const previous = filled[filled.length - 2];
        const delta = latest !== undefined && previous !== undefined ? latest - previous : null;
        return { name, values, latest, previous, delta, ...muscleMeta[name] };
      });
    };

    const routineModuleMeta = {
      morning: { label: "Mañana", short: "AM" },
      gym: { label: "Gym", short: "Gym" },
      home: { label: "Casa", short: "Casa" },
    };

    const moduleFromSystem = (personKey, systemKey) => {
      if (personKey === "mama") return "gym";
      if (systemKey === "morning") return "morning";
      if (systemKey === "afternoon") return "gym";
      return "home";
    };

    const intensityWidth = (value = "") => {
      const text = String(value).toLowerCase();
      if (text.includes("muy")) return "95%";
      if (text.includes("fuerte")) return "78%";
      if (text.includes("moderada")) return "55%";
      return "34%";
    };

    const mealSummary = (plan) => {
      const items = plan?.items || parseIngredientItems(plan?.text || "");
      if (!items.length) return "Plan no cargado";
      return items.map((item) => `${item.title} ${item.amount || ""}`.trim()).join(" + ");
    };

    const defaultRoutine = { icon: "🗓️", type: "Plan", title: "Sin rutina cargada", detail: "Revisa data/plans.v1.json.", exercises: [] };

    function App() {
      const now = new Date();
      const [activePerson, setActivePerson] = React.useState("martin");
      const [activeDay, setActiveDay] = React.useState(dayFromDate(now));
      const [activeMeal, setActiveMeal] = React.useState(mealFromHour(now));
      const [activeSystem, setActiveSystem] = React.useState(systemFromDate(now));
      const [progressView, setProgressView] = React.useState("performance");
      const [visibleMuscles, setVisibleMuscles] = React.useState({});
      const [plans, setPlans] = React.useState(null);
      const [planStatus, setPlanStatus] = React.useState("Cargando planes...");
      const [logs, setLogs] = React.useState({ body: { martin: [], mama: [] }, meals: { martin: [], mama: [] }, workouts: { martin: [], mama: [] } });
      const [form, setForm] = React.useState(emptyBodyForm());
      const [selectedExercise, setSelectedExercise] = React.useState(null);
      const [workoutForm, setWorkoutForm] = React.useState({ weight: "", reps: "", duration: "", distance: "", notes: "" });
      const [status, setStatus] = React.useState("Cargando registros...");
      const [loading, setLoading] = React.useState(false);
      const [clock, setClock] = React.useState(clockLabel(now));

      const person = people[activePerson];
      const personPlans = plans?.profiles?.[activePerson];
      const mealsForDay = plans?.meals?.[activePerson]?.[activeDay] || {};
      const dayPlan = mealsForDay[activeMeal] || {};
      const meal = mealMeta[activeMeal] || mealMeta.Desayuno;
      const routineModule = moduleFromSystem(activePerson, activeSystem);
      const routine = personPlans?.routines?.[activeDay]?.[routineModule] || defaultRoutine;
      const selectedRoutineType = routine.type;
      const availableModules = personPlans?.modules || (activePerson === "mama" ? ["gym"] : ["morning", "gym", "home"]);

                </div>
              </div>
              <textarea className="min-h-20 rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40 md:col-span-6" placeholder="Notas: hambre, fuerza, sueño..." value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} />
            </div>
          </section>}

          <section className="grid gap-4 lg:grid-cols-[.85fr_1.15fr]">
            <div className="rounded-[2rem] glass p-5 shadow-sm">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <p className="text-sm font-light text-white/50">Progreso visual</p>
                  <h3 className="text-2xl font-normal">{progressView === "aesthetic" ? goals.phase : "Rendimiento"}</h3>
                </div>
                <div className="flex rounded-full bg-white/10 p-1 ring-1 ring-white/10">
                  <button onClick={() => setProgressView("performance")} className={`tap rounded-full px-3 py-2 text-xs font-normal ${progressView === "performance" ? "bg-white text-slate-950" : "text-white/60"}`}>Rendimiento</button>
                  <button onClick={() => setProgressView("aesthetic")} className={`tap rounded-full px-3 py-2 text-xs font-normal ${progressView === "aesthetic" ? "bg-white text-slate-950" : "text-white/60"}`}>Estético</button>
                </div>
              </div>

              {progressView === "aesthetic" && <div className="mt-5 space-y-4">
                <div className="rounded-[1.6rem] bg-white/10 p-4 ring-1 ring-white/10">
                  <div className="flex items-end justify-between gap-4">
                    <div>
                      <p className="text-xs font-normal uppercase text-amber-200">Índice griego</p>
                      <p className="mt-1 text-5xl font-normal leading-none text-white">{formatMetric(currentRatio, 2)}</p>
                      <p className="mt-2 text-sm font-light text-white/55">hombro / cintura · meta {formatMetric(goals.targetRatio, 2)}+</p>
                    </div>
                    <div className="text-right">
                      <p className="text-3xl font-normal text-emerald-300">{Math.round(ratioProgress)}%</p>
                      <p className="text-xs font-light text-white/45">ratio</p>
                    </div>
                  </div>
                  <div className="mt-4 h-3 overflow-hidden rounded-full bg-black/25">
                    <div className="h-full rounded-full bg-gradient-to-r from-emerald-500 via-lime-300 to-amber-200 shadow-[0_0_18px_rgba(52,211,153,.55)]" style={{ width: `${ratioProgress}%` }}></div>
                  </div>
                </div>

                <div className="rounded-[1.6rem] bg-white/[.07] p-4 ring-1 ring-white/10">
                  <div className="mb-3 flex items-center justify-between">
                    <p className="text-xs font-normal uppercase text-white/55">Fase de definición</p>
                    <p className="text-sm font-normal text-emerald-300">{definitionProgress}%</p>
                  </div>
                  <div className="h-2 overflow-hidden rounded-full bg-white/10">
                    <div className="h-full rounded-full bg-gradient-to-r from-sky-400 via-emerald-300 to-lime-200" style={{ width: `${definitionProgress}%` }}></div>
                  </div>
                  <div className="mt-4 grid gap-3">
                    {aestheticMetrics.map((metric) => <div key={metric.key} className="rounded-2xl bg-white/10 p-3 ring-1 ring-white/10">
                      <div className="flex items-center justify-between gap-3">
                        <div>
                          <p className="text-xs font-light text-white/45">{metric.label}</p>
                          <p className="text-lg font-normal text-white">{metric.value}</p>
                        </div>
                        <div className="text-right">
                          <p className="text-sm font-normal text-amber-200">{metric.target}</p>
                          <p className="text-xs font-light text-white/40">objetivo</p>
                        </div>
                      </div>
                      <div className="mt-3 h-2 overflow-hidden rounded-full bg-black/25">
                        <div className="h-full rounded-full bg-white" style={{ width: `${metric.progress}%`, background: metric.key === "shoulders" ? "linear-gradient(90deg,#a78bfa,#f0abfc)" : "linear-gradient(90deg,#34d399,#fde68a)" }}></div>
                      </div>
                    </div>)}
                  </div>
                  <div className="mt-3 grid grid-cols-2 gap-3 text-sm">
                    <div className="rounded-2xl bg-white/10 p-3"><p className="text-xs font-light text-white/45">Plan</p><p className="font-normal">{goals.calories}</p></div>
                    <div className="rounded-2xl bg-white/10 p-3"><p className="text-xs font-light text-white/45">Ritmo</p><p className="font-normal">{goals.weeklyLoss}</p></div>
                  </div>
                </div>
              </div>}

              {progressView === "performance" && <div className="mt-5 space-y-4">
                <div className="rounded-[1.6rem] bg-white/10 p-4 ring-1 ring-white/10">
                  <div className="mb-3 flex items-center justify-between gap-3">
                    <div>
                      <p className="text-xs font-normal uppercase text-white/50">Carga por músculo</p>
                      <p className="text-sm font-light text-white/55">Últimas 8 semanas</p>
                    </div>
                    <span className="rounded-full bg-white/10 px-3 py-1 text-xs font-normal text-white/70">{performanceValues.length ? "activo" : "sin datos"}</span>
                  </div>
                  <div className="relative h-40 overflow-hidden rounded-[1.4rem] bg-black/25">
                    {performanceValues.length ? <svg viewBox="0 0 280 130" className="h-full w-full" preserveAspectRatio="none" aria-label="Tendencia de rendimiento por músculo">
                      {[30, 65, 100].map((y) => <line key={y} x1="12" x2="268" y1={y} y2={y} stroke="rgba(255,255,255,.08)" strokeWidth="1" />)}
                      {visiblePerformanceMuscles.map((muscle) => <polyline key={muscle.name} fill="none" stroke={muscle.color} strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round" points={linePoints(muscle.values, performanceMin, performanceMax)} style={{ filter: `drop-shadow(0 0 9px ${muscle.glow})` }} />)}
                    </svg> : <div className="grid h-full place-items-center px-6 text-center text-sm font-light text-white/45">Registra ejercicios para ver fuerza, reps o duración por músculo.</div>}
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-2">
                  {performanceMuscles.map((muscle) => {
                    const active = visibleMuscles[muscle.name] !== false;
                    const hasDelta = muscle.delta !== null && muscle.delta !== undefined;
                    const trend = !hasDelta ? "—" : muscle.delta > 0 ? `↑ ${formatMetric(Math.abs(muscle.delta))}` : muscle.delta < 0 ? `↓ ${formatMetric(Math.abs(muscle.delta))}` : "igual";
                    return <button key={muscle.name} onClick={() => toggleMuscle(muscle.name)} className="tap rounded-2xl p-3 text-left ring-1" style={{ backgroundColor: active ? muscle.glow : "rgba(255,255,255,.05)", borderColor: active ? muscle.color : "rgba(255,255,255,.08)" }}>
                      <div className="flex items-center justify-between gap-2">
                        <p className="text-sm font-normal text-white">{muscle.name}</p>
                        <span className="h-2.5 w-2.5 rounded-full" style={{ backgroundColor: muscle.color, boxShadow: active ? `0 0 12px ${muscle.color}` : "none" }}></span>
                      </div>
                      <p className={`mt-1 text-xs font-light ${hasDelta && muscle.delta < 0 ? "text-rose-200" : "text-emerald-200"}`}>{trend}</p>
                    </button>;
                  })}
                </div>
              </div>}
            </div>

            <div className="rounded-[2rem] glass p-5 shadow-sm">
              <div className="flex flex-wrap items-center justify-between gap-3">
                <div>
                  <p className="text-sm font-light text-white/50">Día y comida</p>
                  <h3 className="text-2xl font-normal">{activeDay}</h3>
                </div>
                <div className="flex max-w-full gap-2 overflow-x-auto hide-scroll">
                  {days.map(d => <button key={d} onClick={() => setDayWithDate(d)} className={`tap shrink-0 rounded-2xl px-3 py-2 text-sm font-normal shadow-sm ${activeDay === d ? "bg-white text-slate-950" : "bg-white/10 text-white"}`}>{d.slice(0, 3)}</button>)}
                </div>
              </div>

              <div className="mt-4 grid gap-3">
                {mealOrder.map((mealName) => <button key={mealName} onClick={() => setActiveMeal(mealName)} className={`tap rounded-[1.5rem] p-4 text-left shadow-sm ${activeMeal === mealName ? "bg-white text-slate-950" : "bg-white/10 text-white"}`}>
                  <div className="flex items-center gap-2">
                    <span className="text-2xl">{mealMeta[mealName].emoji}</span>
                    <h4 className="font-normal">{mealName}</h4>
                  </div>
                  <p className={`mt-2 text-sm leading-relaxed ${activeMeal === mealName ? "text-slate-600" : "text-white/60"}`}>{mealSummary(mealsForDay[mealName])}</p>
                </button>)}
              </div>
            </div>
          </section>

          <section className="rounded-[2rem] glass p-5 shadow-sm">
            <div className="mb-4 flex items-center justify-between">
              <div>
                <p className="text-sm font-light text-white/50">Historial</p>
                <h3 className="text-2xl font-normal">{person.label}</h3>
              </div>
              <span className="rounded-2xl bg-white/10 px-3 py-2 text-sm font-normal shadow-sm">{currentLogs.length} total</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full min-w-[720px] text-sm">
                <thead><tr className="border-b border-white/10 text-left text-white/50"><th className="py-3">Fecha</th><th>Peso</th><th>Cintura</th><th>Pasos</th><th>Notas</th><th></th></tr></thead>
                <tbody>
                  {sortedLogs.slice(0, 12).map(r => <tr key={r.id} className="border-b border-white/10 last:border-0">
                    <td className="py-3 font-normal">{normalizeDate(r.date)}</td>
                    <td>{r.weight ? `${r.weight} kg` : "—"}</td>
                    <td>{r.waist ? `${r.waist} cm` : "—"}</td>
                    <td>{r.steps || "—"}</td>
                    <td className="max-w-sm truncate text-white/60">{r.notes || "—"}</td>
                    <td className="text-right"><button onClick={() => deleteLog(r.id)} className="tap rounded-xl bg-white/10 px-3 py-2 shadow-sm">🗑️</button></td>
                  </tr>)}
                  {!sortedLogs.length && <tr><td colSpan="6" className="py-8 text-center font-light text-slate-400">Todavía no hay registros</td></tr>}
                </tbody>
              </table>
            </div>
          </section>
          {selectedExercise && <div className="fixed inset-0 z-50 grid place-items-end bg-black/55 p-4 backdrop-blur-sm md:place-items-center">
            <div className="w-full max-w-md rounded-[2rem] bg-[#191b22] p-5 text-white shadow-2xl ring-1 ring-white/10">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <p className="text-xs font-normal uppercase text-white/45">{routine.title}</p>
                  <h3 className="mt-1 text-2xl font-normal leading-tight">{selectedExercise.icon} {selectedExercise.name}</h3>
                  <p className="mt-1 text-sm font-light text-white/55">{selectedExercise.sets} series · {selectedExercise.reps} reps · {selectedExercise.intensity}</p>
                </div>
                <button onClick={() => setSelectedExercise(null)} className="tap grid h-9 w-9 place-items-center rounded-full bg-white/10 text-white">×</button>
              </div>
              <div className="mt-5 grid gap-3">
                {selectedExercise.tracking === "weighted" && <input inputMode="decimal" className="rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Peso usado" value={workoutForm.weight} onChange={e => setWorkoutForm({...workoutForm, weight: e.target.value})} />}
                {(selectedExercise.tracking === "weighted" || selectedExercise.tracking === "bodyweight") && <input inputMode="numeric" className="rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Reps logradas" value={workoutForm.reps} onChange={e => setWorkoutForm({...workoutForm, reps: e.target.value})} />}
                {selectedExercise.tracking === "timed" && <input className="rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Duración" value={workoutForm.duration} onChange={e => setWorkoutForm({...workoutForm, duration: e.target.value})} />}
                {selectedExercise.tracking === "distance" && <input className="rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Distancia / tiempo" value={workoutForm.distance} onChange={e => setWorkoutForm({...workoutForm, distance: e.target.value})} />}
                {selectedExercise.tracking === "completion" && <p className="rounded-2xl bg-white/10 p-3 text-sm font-light text-white/70">Se guardará como completado.</p>}
                <textarea className="min-h-20 rounded-2xl bg-white/10 p-3 text-white outline-none ring-1 ring-white/10 placeholder:text-white/40" placeholder="Notas opcionales" value={workoutForm.notes} onChange={e => setWorkoutForm({...workoutForm, notes: e.target.value})} />
                <button disabled={loading} onClick={addWorkoutLog} className="tap rounded-2xl bg-white p-3 font-normal text-slate-950">{status === "Guardando ejercicio..." ? "Guardando..." : "Guardar ejercicio"}</button>
              </div>
            </div>
          </div>}
        </main>
      </div>
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
